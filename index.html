<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade Escolar Premium - Turquesa Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0D9488', // Teal 600 (Turquesa Base)
                        secondary: '#2DD4BF', // Teal 400 (Turquesa Claro)
                        accent: '#0F766E', // Teal 700
                        darkBg: '#0F172A',
                        darkCard: '#1E293B',
                        success: '#22C55E'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .font-digital { font-family: 'JetBrains Mono', monospace; }

        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0D9488; border-radius: 10px; }

        .mobile-grid { display: block; }
        .desktop-table { display: none; }

        @media (min-width: 1025px) {
            .mobile-grid { display: none; }
            .desktop-table { display: table; }
        }

        .is-generating-pdf .mobile-grid { display: none !important; }
        .is-generating-pdf .desktop-table { 
            display: table !important; 
            width: 1050px !important; 
            margin: 0 !important; 
        }
        .is-generating-pdf .no-pdf { display: none !important; }
        .is-generating-pdf #exportArea { 
            width: 1050px !important; 
            margin: 0 !important; 
            padding: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
        }
        .is-generating-pdf input.editable-input {
            border: none !important;
            background: transparent !important;
        }

        .editable-input {
            background: transparent;
            border: none;
            width: 100%;
            text-align: inherit;
            color: inherit;
            transition: all 0.2s;
            cursor: default;
            font-weight: inherit;
        }

        textarea.editable-input {
            resize: none;
            overflow: hidden;
            display: block;
            line-height: 1.2;
        }
        
        .edit-mode .editable-input {
            background-color: rgba(13, 148, 136, 0.1);
            box-shadow: inset 0 -1px 0 rgba(13, 148, 136, 0.5);
            cursor: text;
        }

        #pdfLoader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 800;
        }

        .current-row { background-color: rgba(13, 148, 136, 0.05) !important; }
        .current-day-col { background-color: rgba(34, 197, 94, 0.03) !important; position: relative; }

        .day-marker {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: #0D9488;
            display: none;
            z-index: 10;
        }
        
        .active-day .day-marker {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        .active-cell {
            background-color: rgba(13, 148, 136, 0.12) !important;
            box-shadow: inset 0 0 15px rgba(13, 148, 136, 0.05);
        }

        .current-card {
            border: 2px solid #0D9488 !important;
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(13, 148, 136, 0.3);
            z-index: 20;
        }

        @keyframes pulse-border {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pulse { animation: pulse-border 2s infinite; }
        #progressBar { transition: width 1s linear; }
    </style>
</head>

    <script>
        const days = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
        
        const scheduleData = [
            { type: 'class', items: [['Intervenção Cidadã', 'Marcelo'], ['Português', 'Elza'], ['Matemática', 'Crislaine'], ['Química', 'Pollyana'], ['Biologia', 'Ranner']] },
            { type: 'class', items: [['História', 'Geane'], ['Arte', 'Cristino'], ['Português', 'Elza'], ['Matemática', 'Crislaine'], ['Física', 'Daniel']] },
            { type: 'break', label: 'Intervalo', content: 'Convivência Social' },
            { type: 'class', items: [['Matemática', 'Crislaine'], ['Geografia', 'Marcelo'], ['Sociologia', 'Fabíola'], ['Português', 'Elza'], ['Soluções Mat.', 'Vilson']] },
            { type: 'class', items: [['Português', 'Elza'], ['Matemática', 'Crislaine'], ['Filosofia', 'José'], ['Biologia', 'Ranner'], ['Inglês', 'Ana Paula']] }
        ];

        let globalTimeline = [];

        function addMinutes(time, mins) {
            let [h, m] = time.split(':').map(Number);
            let date = new Date();
            date.setHours(h, m + mins, 0);
            return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
        }

        function getDuration(start, end) {
            let [h1, m1] = start.split(':').map(Number);
            let [h2, m2] = end.split(':').map(Number);
            let totalMinutes = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (totalMinutes < 0) totalMinutes += 24 * 60;
            return `${Math.floor(totalMinutes / 60)}H ${(totalMinutes % 60).toString().padStart(2, '0')}MIN`;
        }

        function calculateTimeline(startTime) {
            const classDuration = 45; 
            const breakDuration = 30;  
            let current = startTime;
            let timeline = [];

            scheduleData.forEach(row => {
                let end = addMinutes(current, row.type === 'class' ? classDuration : breakDuration);
                timeline.push({ start: current, end: end, type: row.type });
                current = end;
            });
            return timeline;
        }

        function updateLiveClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('pt-BR');
            const dayNum = now.getDate().toString().padStart(2, '0');
            const monthNum = (now.getMonth() + 1).toString().padStart(2, '0');
            const yearNum = now.getFullYear();
            const rawDay = now.getDay(); 
            const weekDayIdx = rawDay === 0 ? 6 : rawDay - 1; 
            const weekDayName = days[weekDayIdx] || 'Fim de Semana';
            const dateStr = `${dayNum}/${monthNum}/${yearNum} • ${weekDayName}`;
            
            const liveClock = document.getElementById('liveClock');
            const liveDate = document.getElementById('liveDate');
            if(liveClock) liveClock.textContent = timeStr;
            if(liveDate) liveDate.textContent = dateStr;

            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const statusDot = document.getElementById('schoolStatus');
            
            let currentIdx = -1;
            globalTimeline.forEach((time, idx) => {
                const [hS, mS] = time.start.split(':').map(Number);
                const [hE, mE] = time.end.split(':').map(Number);
                const startMins = hS * 60 + mS;
                const endMins = hE * 60 + mE;
                if (currentMinutes >= startMins && currentMinutes < endMins) currentIdx = idx;
            });

            document.querySelectorAll('.current-row').forEach(el => el.classList.remove('current-row'));
            document.querySelectorAll('.current-day-col').forEach(el => el.classList.remove('current-day-col'));
            document.querySelectorAll('.active-cell').forEach(el => el.classList.remove('active-cell'));
            document.querySelectorAll('.current-card').forEach(el => el.classList.remove('current-card'));
            document.querySelectorAll('.active-day').forEach(el => el.classList.remove('active-day'));

            const isSchoolDay = rawDay >= 1 && rawDay <= 5;
            
            if (isSchoolDay) {
                document.querySelectorAll(`th[data-day-index="${rawDay}"]`).forEach(el => el.classList.add('active-day'));
                document.querySelectorAll(`#mobile-day-sec-${rawDay}`).forEach(el => el.classList.add('active-day'));

                if (currentIdx !== -1) {
                    statusDot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm pulse';
                    document.querySelectorAll(`[data-row-index="${currentIdx}"]`).forEach(el => el.classList.add('current-row'));
                    document.querySelectorAll(`[data-day-index="${rawDay}"]`).forEach(el => el.classList.add('current-day-col'));
                    document.querySelectorAll(`[data-cell-id="r${currentIdx}d${rawDay}"]`).forEach(el => el.classList.add('active-cell'));
                    document.querySelectorAll(`[data-card-day-index="${rawDay}"][data-card-row-index="${currentIdx}"]`).forEach(el => el.classList.add('current-card'));
                } else {
                    statusDot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm';
                    document.querySelectorAll(`[data-day-index="${rawDay}"]`).forEach(el => el.classList.add('current-day-col'));
                }
            } else {
                statusDot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm';
            }

            updateProgressBar(currentMinutes, isSchoolDay);
        }

        function updateProgressBar(nowMins, isSchoolDay) {
            const progressBar = document.getElementById('progressBar');
            const progressPercentage = document.getElementById('progressPercentage');
            if (!progressBar) return;

            if (globalTimeline.length === 0 || !isSchoolDay) {
                 progressBar.style.width = '0%';
                 progressPercentage.textContent = '0%';
                 return;
            }

            const startTime = document.getElementById('startTimeInput').value;
            const endTime = globalTimeline[globalTimeline.length - 1].end;
            const [hS, mS] = startTime.split(':').map(Number);
            const [hE, mE] = endTime.split(':').map(Number);
            
            let startMinsTotal = hS * 60 + mS;
            let endMinsTotal = hE * 60 + mE;
            if (endMinsTotal < startMinsTotal) endMinsTotal += 24 * 60;
            
            let adjustedNow = nowMins;
            if (adjustedNow < startMinsTotal && nowMins < 120) adjustedNow += 24 * 60;

            let percentage = 0;
            if (adjustedNow >= startMinsTotal) {
                const totalMins = endMinsTotal - startMinsTotal;
                const elapsedMins = adjustedNow - startMinsTotal;
                percentage = Math.min(100, Math.floor((elapsedMins / totalMins) * 100));
            }

            progressBar.style.width = percentage + '%';
            progressPercentage.textContent = percentage + '%';
        }

        function renderSchedule() {
            const desktopBody = document.getElementById('desktopBody');
            const mobileSchedule = document.getElementById('mobileSchedule');
            const startTime = document.getElementById('startTimeInput').value || '19:00';
            const endTimeDisplay = document.getElementById('endTimeDisplay');
            const totalDurationDisplay = document.getElementById('totalDurationDisplay');
            
            globalTimeline = calculateTimeline(startTime);
            
            if (globalTimeline.length > 0) {
                const finalTime = globalTimeline[globalTimeline.length - 1].end;
                endTimeDisplay.textContent = finalTime;
                totalDurationDisplay.textContent = getDuration(startTime, finalTime);
            }

            let desktopHTML = '';
            let mobileHTMLByDay = days.map((day, idx) => ({ day, content: '', dayIdx: idx + 1 }));
            let classCounter = 1;

            scheduleData.forEach((row, rIdx) => {
                const timeInfo = globalTimeline[rIdx];
                const timeLabel = `${timeInfo.start} - ${timeInfo.end}`;

                if (row.type === 'break') {
                    desktopHTML += `
                        <tr data-row-index="${rIdx}" class="bg-primary border-y border-teal-600/30 transition-colors">
                            <td class="p-4 text-center border-r border-teal-700/20">
                                <div class="text-[10px] font-black text-white">${timeLabel}</div>
                                <div class="text-[8px] font-bold text-teal-100 uppercase italic">Intervalo</div>
                            </td>
                            <td colspan="5" class="p-4 text-center text-lg font-black uppercase tracking-[0.5em] text-white italic">
                                • ${row.content} •
                            </td>
                        </tr>
                    `;
                    mobileHTMLByDay.forEach(d => {
                        d.content += `
                            <div data-card-day-index="${d.dayIdx}" data-card-row-index="${rIdx}" class="bg-primary/20 border-l-4 border-primary p-3 my-4 rounded-r shadow-sm text-center transition-all">
                                <div class="text-[8px] font-black text-teal-800 dark:text-secondary uppercase tracking-widest mb-1">INTERVALO • ${timeLabel}</div>
                                <div class="text-[12px] font-black text-slate-800 dark:text-slate-200 italic">${row.content}</div>
                            </div>
                        `;
                    });
                } else {
                    let tdCells = `
                        <td class="p-4 border-r border-slate-200 dark:border-slate-700 text-center bg-slate-50/50 dark:bg-slate-800/20">
                            <div class="text-[10px] font-black text-slate-900 dark:text-white tabular-nums">${timeLabel}</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">${classCounter}º HORÁRIO</div>
                        </td>
                    `;
                    
                    row.items.forEach((cell, cIdx) => {
                        const dayIdx = cIdx + 1;
                        const keyS = `r${rIdx}c${cIdx}s`;
                        const keyP = `r${rIdx}c${cIdx}p`;
                        
                        tdCells += `
                            <td data-day-index="${dayIdx}" data-cell-id="r${rIdx}d${dayIdx}" class="p-3 border-r border-slate-200 dark:border-slate-700 text-center hover:bg-teal-50 dark:hover:bg-teal-900/10 transition-all">
                                <input class="editable-input font-black text-[11px] block mb-0.5" data-key="${keyS}" value="${cell[0]}" readonly>
                                <div class="text-[9px] font-bold text-teal-700 dark:text-secondary uppercase flex items-center justify-center gap-1 bg-teal-500/5 py-0.5 rounded">
                                    <input class="editable-input w-auto text-center" data-key="${keyP}" value="${cell[1]}" readonly>
                                </div>
                            </td>
                        `;

                        mobileHTMLByDay[cIdx].content += `
                            <div data-card-day-index="${dayIdx}" data-card-row-index="${rIdx}" class="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 mb-3 shadow-md transition-all">
                                <div class="text-[9px] font-black text-slate-400 w-16 leading-tight uppercase border-r border-slate-100 dark:border-slate-700 pr-2 shrink-0 tabular-nums text-center">
                                    ${timeInfo.start}<br><span class="text-[8px] opacity-60">${timeInfo.end}</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <input class="editable-input font-black text-sm block mb-1 truncate" data-key="${keyS}" value="${cell[0]}" readonly>
                                    <div class="text-[10px] text-teal-700 dark:text-secondary font-bold uppercase flex items-center gap-1 truncate">
                                        <span class="opacity-40 font-bold">PROF:</span>
                                        <input class="editable-input w-auto truncate" data-key="${keyP}" value="${cell[1]}" readonly>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    desktopHTML += `<tr data-row-index="${rIdx}" class="border-b border-slate-100 dark:border-slate-800 transition-colors">${tdCells}</tr>`;
                    classCounter++;
                }
            });

            desktopBody.innerHTML = desktopHTML;
            
            let mobileFinalHTML = '';
            mobileHTMLByDay.forEach(dayObj => {
                mobileFinalHTML += `
                    <section id="mobile-day-sec-${dayObj.dayIdx}" class="max-w-md mx-auto w-full relative">
                        <div class="day-marker !h-1 !top-[-10px] rounded-full"></div>
                        <h3 class="flex items-center gap-3 mb-4">
                            <span class="px-3 py-1 bg-teal-600 text-white font-black uppercase tracking-widest text-[10px] rounded-lg shadow-md">${dayObj.day}</span>
                            <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                        </h3>
                        ${dayObj.content}
                    </section>
                `;
            });
            mobileSchedule.innerHTML = mobileFinalHTML;

            attachInputEvents();
            loadData();
            autoResizeTitle();
            updateLiveClock();
        }

        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const toggleBtn = document.getElementById('toggleEdit');
        const editText = document.getElementById('editText');
        const mainContainer = document.getElementById('mainContainer');
        const startTimeInput = document.getElementById('startTimeInput');
        let isEditing = false;

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        startTimeInput.addEventListener('input', renderSchedule);

        function saveData() {
            const data = {};
            document.querySelectorAll('.editable-input').forEach(input => {
                const key = input.getAttribute('data-key');
                if(key) data[key] = input.value;
            });
            localStorage.setItem('grade_v2026_turquoise', JSON.stringify(data));
        }

        function loadData() {
            const savedData = localStorage.getItem('grade_v2026_turquoise');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.querySelectorAll('.editable-input').forEach(input => {
                    const key = input.getAttribute('data-key');
                    if (data[key]) {
                        input.value = data[key];
                        document.querySelectorAll(`[data-key="${key}"]`).forEach(el => el.value = data[key]);
                    }
                });
            }
        }

        function attachInputEvents() {
            document.querySelectorAll('.editable-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const key = e.target.getAttribute('data-key');
                    const value = e.target.value;
                    document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
                        if (el !== e.target) el.value = value;
                    });
                    saveData();
                });
            });
        }

        toggleBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            mainContainer.classList.toggle('edit-mode');
            document.querySelectorAll('.editable-input').forEach(input => input.readOnly = !isEditing);
            editText.textContent = isEditing ? "Salvar" : "Editar";
            toggleBtn.classList.toggle('bg-primary', isEditing);
            if (isEditing) toggleBtn.classList.add('text-white');
            else toggleBtn.classList.remove('text-white');
            
            if (!isEditing) saveData();
            autoResizeTitle();
        });

        async function generatePDF() {
            const loader = document.getElementById('pdfLoader');
            const element = document.getElementById('exportArea');
            const schoolName = document.querySelector('[data-key="schoolName"]').value || 'Grade';
            
            loader.style.display = 'flex';
            document.body.classList.add('is-generating-pdf');

            const opt = {
                margin: 0,
                filename: `Grade_Turquesa_${schoolName.substring(0,25).replace(/ /g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false, 
                    windowWidth: 1100,
                    scrollY: 0,
                    scrollX: 0
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak: { mode: 'avoid-all' }
            };

            try {
                await new Promise(r => setTimeout(r, 500));
                await html2pdf().set(opt).from(element).save();
            } finally {
                document.body.classList.remove('is-generating-pdf');
                loader.style.display = 'none';
                autoResizeTitle();
            }
        }

        function autoResizeTitle() {
            const tx = document.querySelector('textarea[data-key="schoolName"]');
            if (tx) {
                tx.style.height = 'auto';
                tx.style.height = tx.scrollHeight + 'px';
            }
        }

        window.addEventListener('resize', autoResizeTitle);
        setInterval(updateLiveClock, 1000);
        renderSchedule();
    </script>
</body>
</html>
