<!DOCTYPE html>
<html lang="pt-pt" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Escolar Premium - E.E. Profa. Juvenília</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#f0fdfa', 
                            dark: '#0f172a',
                            primary: '#0d9488', 
                            primaryHover: '#0f766e', 
                            secondary: '#64748b', 
                            accent: '#2dd4bf', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.01em;
        }

        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: #99f6e4; 
            border-radius: 10px; 
        }

        .editable-input {
            background: transparent;
            border: none;
            width: 100%;
            text-align: center; /* Centralização forçada */
            color: inherit;
            transition: all 0.2s ease;
            cursor: default;
        }
        
        .edit-mode .editable-input {
            background-color: rgba(13, 148, 136, 0.1);
            box-shadow: 0 1px 0 #0d9488;
            cursor: text;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.9);
        }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-container { 
                box-shadow: none !important; 
                border: none !important;
                width: 100% !important;
                padding: 0.8cm !important;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .editable-input { border: none !important; box-shadow: none !important; }
            table { page-break-inside: avoid; width: 100% !important; }
            #mainContainer { width: 100% !important; max-width: none !important; padding: 0 !important; }
        }

        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 20;
            background-color: inherit;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-brand-dark text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <nav class="sticky top-0 z-[100] glass border-b border-slate-200 dark:border-slate-800 no-print">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-primary rounded-lg flex items-center justify-center shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <h1 class="font-bold text-slate-900 dark:text-white text-sm hidden sm:block">Grade<span class="text-brand-primary">Master</span></h1>
            </div>

            <div class="flex items-center gap-2">
                <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <svg id="sunIcon" class="hidden dark:block w-4 h-4 text-brand-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <svg id="moonIcon" class="block dark:hidden w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
                <button id="toggleEdit" class="flex items-center gap-2 px-3 py-1.5 rounded-lg font-bold text-xs transition-all bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm">
                    <svg id="editIcon" xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-brand-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    <span id="editText">Editar</span>
                </button>
                <button onclick="window.print()" class="flex items-center gap-2 px-4 py-1.5 bg-brand-primary text-white rounded-lg font-bold text-xs shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                    <span>PDF</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="mainContainer" class="max-w-6xl mx-auto p-2 sm:p-6">
        
        <div class="bg-white dark:bg-slate-900 rounded-[1.5rem] sm:rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800 print-container overflow-hidden">
            
            <!-- Cabeçalho Centralizado -->
            <header class="p-4 sm:p-6 border-b border-slate-100 dark:border-slate-800 text-center space-y-3">
                <div class="flex flex-col items-center space-y-2">
                    <div class="inline-flex items-center gap-2 px-3 py-0.5 rounded-full bg-teal-50 dark:bg-teal-900/20 text-teal-700 dark:text-teal-400 text-[8px] font-black uppercase tracking-[0.2em] border border-teal-100 dark:border-teal-800">
                        Documento Oficial de Horários
                    </div>
                    
                    <h2 class="text-base sm:text-2xl font-black text-slate-900 dark:text-white leading-tight w-full max-w-4xl">
                        <input class="editable-input uppercase" data-key="schoolName" value="E.E. PROFA. JUVENÍLIA FERREIRA DO AMARAL" readonly>
                    </h2>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-4 max-w-5xl mx-auto">
                    <div class="flex flex-col items-center">
                        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Diretor</p>
                        <input class="editable-input text-[10px] font-bold text-slate-700 dark:text-slate-300" data-key="staff1" value="LUIZ ANTÔNIO DE SOUZA" readonly>
                    </div>
                    <div class="flex flex-col items-center">
                        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Vice-Direção</p>
                        <input class="editable-input text-[10px] font-bold text-slate-700 dark:text-slate-300" data-key="staff2" value="TÚLIO SIQUEIRA DE OLIVEIRA" readonly>
                    </div>
                    <div class="flex flex-col items-center">
                        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Supervisão</p>
                        <input class="editable-input text-[10px] font-bold text-slate-700 dark:text-slate-300" data-key="staff3" value="JACQUELINE CATALUNHA" readonly>
                    </div>
                    <div class="flex flex-col items-center">
                        <p class="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Coordenação</p>
                        <input class="editable-input text-[10px] font-bold text-slate-700 dark:text-slate-300" data-key="staff4" value="GIULIANA MARTINS FERREIRA" readonly>
                    </div>
                </div>

                <div class="flex justify-center gap-6 pt-1 text-[8px] font-bold uppercase text-slate-400">
                    <div class="flex items-center gap-1">
                        <span>Ano Letivo:</span>
                        <input class="editable-input w-10 text-teal-600 font-black" data-key="academicYear" value="2026" readonly>
                    </div>
                    <div class="flex items-center gap-1">
                        <span>Emissão:</span>
                        <input id="currentDateInput" class="editable-input w-16 text-slate-600 dark:text-slate-400 font-bold" data-key="currentDate" value="" readonly>
                    </div>
                </div>
            </header>

            <!-- Tabela Otimizada -->
            <div class="w-full custom-scroll overflow-x-auto relative">
                <table class="w-full border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400">
                            <th class="sticky-col p-2 w-28 text-center border-r border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/90">
                                <div class="inline-flex flex-col items-center">
                                    <div class="px-2 py-0.5 rounded bg-teal-600 text-white text-[8px] font-black uppercase mb-0.5">
                                        <input class="editable-input text-center w-12" data-key="shift" value="Noturno" readonly>
                                    </div>
                                    <div class="text-[9px] font-bold text-slate-800 dark:text-slate-200">
                                        <input class="editable-input text-center" data-key="classLevel" value="3º ANO EJA" readonly>
                                    </div>
                                </div>
                            </th>
                            <th class="p-2 border-r border-slate-100 dark:border-slate-800 font-black uppercase text-[9px] tracking-widest">Segunda</th>
                            <th class="p-2 border-r border-slate-100 dark:border-slate-800 font-black uppercase text-[9px] tracking-widest">Terça</th>
                            <th class="p-2 border-r border-slate-100 dark:border-slate-800 font-black uppercase text-[9px] tracking-widest">Quarta</th>
                            <th class="p-2 border-r border-slate-100 dark:border-slate-800 font-black uppercase text-[9px] tracking-widest">Quinta</th>
                            <th class="p-2 font-black uppercase text-[9px] tracking-widest">Sexta</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <tr class="border-y border-slate-100 dark:border-slate-800">
                            <td class="sticky-col p-1.5 bg-white dark:bg-slate-900 text-center font-black text-teal-600 border-r border-slate-100 dark:border-slate-800 text-[10px]">
                                <input class="editable-input text-center" data-key="t1" value="18:10" readonly>
                            </td>
                            <td colspan="5" class="py-1 text-center bg-slate-50/20">
                                <span class="text-[8px] font-black tracking-[1.5em] text-slate-300 dark:text-slate-700 uppercase italic">Início das Aulas</span>
                            </td>
                        </tr>
                        <!-- Injetado via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Rodapé Centralizado -->
            <footer class="p-4 sm:p-6 bg-slate-50/50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex flex-col items-center text-center space-y-4">
                <div class="flex flex-col items-center gap-1">
                    <p class="text-[7px] font-black uppercase tracking-[0.3em] text-slate-400 leading-none">Autenticação do Sistema</p>
                    <p class="text-[9px] font-bold text-slate-700 dark:text-slate-300">DOC: JUV-AMARAL-2026-OFFICIAL-VERIFIED</p>
                </div>
                
                <div class="w-full max-w-xs flex flex-col items-center">
                    <div class="w-full h-[0.5px] bg-slate-300 dark:bg-slate-700 mb-2"></div>
                    <p class="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">Assinatura e Carimbo</p>
                </div>
            </footer>
        </div>

        <div class="mt-4 text-center no-print sm:hidden">
            <p class="text-[9px] font-bold text-slate-400 uppercase animate-pulse">↔ Deslize para ver todos os dias ↔</p>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const toggleBtn = document.getElementById('toggleEdit');
        const editText = document.getElementById('editText');
        const mainContainer = document.getElementById('mainContainer');
        const dateInput = document.getElementById('currentDateInput');
        const scheduleBody = document.getElementById('scheduleBody');
        let isEditing = false;

        const dataSet = [
            { label: '1º Horário', data: [['Soluções Matemáticas', 'Vilson'], ['Língua Portuguesa', 'Elza'], ['Intervenção Cidadã', 'Marcelo'], ['Química', 'Pollyana'], ['Biologia', 'Ranner']] },
            { label: '2º Horário', data: [['História', 'Geane'], ['Arte', 'Cristino'], ['Língua Portuguesa', 'Elza'], ['Matemática', 'Crislaine'], ['Física', 'Daniel']] },
            { label: 'Recreio' },
            { label: '3º Horário', data: [['Matemática', 'Crislaine'], ['Geografia', 'Marcelo'], ['Sociologia', 'Fabiola'], ['Língua Portuguesa', 'Elza'], ['Matemática', 'Crislaine']] },
            { label: '4º Horário', data: [['Língua Portuguesa', 'Elza'], ['Matemática', 'Crislaine'], ['Filosofia', 'José'], ['Biologia', 'Ranner'], ['Inglês', 'Ana Paula']] }
        ];

        function renderTable() {
            let htmlContent = scheduleBody.innerHTML;
            dataSet.forEach((row, rIdx) => {
                if(row.label === 'Recreio') {
                    htmlContent += `
                        <tr class="bg-teal-50/20 dark:bg-teal-900/5">
                            <td class="sticky-col p-2 text-center font-black uppercase text-teal-600 border-r border-slate-100 dark:border-slate-800 bg-teal-50 dark:bg-slate-900 text-[9px]">RECREIO</td>
                            <td colspan="5" class="p-2 text-center">
                                <span class="text-[8px] font-black uppercase tracking-[0.8em] text-teal-500/30 italic">Intervalo</span>
                            </td>
                        </tr>`;
                } else {
                    let cells = '';
                    row.data.forEach((cell, cIdx) => {
                        cells += `
                            <td class="p-2 border-r border-slate-50 dark:border-slate-800 text-center">
                                <div class="flex flex-col items-center gap-0.5">
                                    <input class="editable-input font-extrabold text-slate-800 dark:text-slate-100 text-[10px] leading-tight" data-key="r${rIdx}c${cIdx}s" value="${cell[0]}" readonly>
                                    <div class="inline-flex py-0.5 px-2 rounded-full bg-slate-100 dark:bg-slate-800 text-[8px] font-bold text-slate-500 dark:text-slate-400">
                                        <input class="editable-input text-center" data-key="r${rIdx}c${cIdx}p" value="${cell[1]}" readonly>
                                    </div>
                                </div>
                            </td>`;
                    });
                    htmlContent += `
                        <tr class="border-b border-slate-50 dark:border-slate-800/50">
                            <td class="sticky-col p-2 bg-white dark:bg-slate-900 text-center font-bold border-r border-slate-100 dark:border-slate-800 uppercase text-[8px] text-slate-400">
                                <input class="editable-input text-center" data-key="rowLabel${rIdx}" value="${row.label}" readonly>
                            </td>
                            ${cells}
                        </tr>`;
                }
            });
            scheduleBody.innerHTML = htmlContent;
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        function setTodayDate() {
            const today = new Date();
            const formattedDate = today.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            if (!dateInput.value) dateInput.value = formattedDate;
        }

        function loadData() {
            const savedData = localStorage.getItem('grade_premium_v3');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.querySelectorAll('.editable-input').forEach(input => {
                    const key = input.getAttribute('data-key');
                    if (data[key]) input.value = data[key];
                });
            } else {
                setTodayDate();
            }
        }

        function saveData() {
            const data = {};
            document.querySelectorAll('.editable-input').forEach(input => {
                const key = input.getAttribute('data-key');
                if(key) data[key] = input.value;
            });
            localStorage.setItem('grade_premium_v3', JSON.stringify(data));
        }

        toggleBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            mainContainer.classList.toggle('edit-mode');
            document.querySelectorAll('.editable-input').forEach(input => input.readOnly = !isEditing);
            if (isEditing) {
                editText.textContent = "Salvar";
                toggleBtn.classList.replace('bg-white', 'bg-brand-primary');
                toggleBtn.classList.add('text-white');
            } else {
                editText.textContent = "Editar";
                toggleBtn.classList.replace('bg-brand-primary', 'bg-white');
                toggleBtn.classList.remove('text-white');
                saveData();
            }
        });

        renderTable();
        loadData();
        document.addEventListener('input', (e) => {
            if(e.target.classList.contains('editable-input')) saveData();
        });
    </script>
</body>
</html>
